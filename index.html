<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - HTML5 Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        #gameContainer {
            position: relative;
            border: 4px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        #gameCanvas {
            display: block;
            background: #0f0f23;
        }

        #ui {
            display: flex;
            justify-content: space-between;
            width: 600px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 18px;
        }

        #ui span {
            padding: 5px 15px;
            background: rgba(233, 69, 96, 0.3);
            border-radius: 5px;
        }

        #instructions {
            margin-top: 20px;
            color: #888;
            text-align: center;
            font-size: 14px;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #e94560;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
            z-index: 10;
        }

        #gameOver h2 {
            margin-bottom: 20px;
            font-size: 36px;
        }

        #gameOver button {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #gameOver button:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>🎮 坦克大战</h1>

    <div id="ui">
        <span>分数: <span id="score">0</span></span>
        <span>生命: <span id="lives">3</span></span>
        <span>关卡: <span id="level">1</span></span>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div id="gameOver">
            <h2>游戏结束</h2>
            <p>最终分数: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <div id="instructions">
        <p>控制: WASD 或 方向键 移动 | 空格键 射击 | R 重新开始</p>
    </div>

    <script>
        // 游戏配置
        const CANVAS_WIDTH = 600;
        const CANVAS_HEIGHT = 600;
        const TANK_SIZE = 30;
        const BULLET_SIZE = 5;
        const ENEMY_SIZE = 25;
        const WALL_SIZE = 30;

        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏状态
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            isGameOver: false,
            isPaused: false
        };

        // 玩家坦克
        let player = {
            x: CANVAS_WIDTH / 2 - TANK_SIZE / 2,
            y: CANVAS_HEIGHT - TANK_SIZE - 10,
            width: TANK_SIZE,
            height: TANK_SIZE,
            speed: 4,
            direction: 0, // 0:上, 1:右, 2:下, 3:左
            color: '#00ff88',
            isAlive: true,
            cooldown: 0
        };

        // 子弹数组
        let bullets = [];
        let enemyBullets = [];

        // 敌人数组
        let enemies = [];

        // 墙壁数组
        let walls = [];

        // 键盘状态
        let keys = {};

        // 初始化墙壁
        function initWalls() {
            walls = [];
            // 边框墙
            for (let i = 0; i < CANVAS_WIDTH; i += WALL_SIZE) {
                walls.push({ x: i, y: 0, type: 'border' });
                walls.push({ x: i, y: CANVAS_HEIGHT - WALL_SIZE, type: 'border' });
            }
            for (let i = WALL_SIZE; i < CANVAS_HEIGHT - WALL_SIZE; i += WALL_SIZE) {
                walls.push({ x: 0, y: i, type: 'border' });
                walls.push({ x: CANVAS_WIDTH - WALL_SIZE, y: i, type: 'border' });
            }

            // 随机添加内部墙壁
            const wallCount = 10 + gameState.level * 2;
            for (let i = 0; i < wallCount; i++) {
                let wallX = Math.floor(Math.random() * (CANVAS_WIDTH - 2 * WALL_SIZE) / WALL_SIZE) * WALL_SIZE + WALL_SIZE;
                let wallY = Math.floor(Math.random() * (CANVAS_HEIGHT - 2 * WALL_SIZE) / WALL_SIZE) * WALL_SIZE + WALL_SIZE;

                // 避免在玩家起始位置放置墙壁
                if (wallY < CANVAS_HEIGHT - 150) {
                    walls.push({ x: wallX, y: wallY, type: 'normal' });
                }
            }
        }

        // 初始化敌人
        function initEnemies() {
            enemies = [];
            const enemyCount = 2 + gameState.level;

            for (let i = 0; i < enemyCount; i++) {
                enemies.push({
                    x: Math.floor(Math.random() * (CANVAS_WIDTH - 2 * WALL_SIZE) / WALL_SIZE) * WALL_SIZE + WALL_SIZE,
                    y: Math.floor(Math.random() * (CANVAS_HEIGHT / 2) / WALL_SIZE) * WALL_SIZE + WALL_SIZE,
                    width: ENEMY_SIZE,
                    height: ENEMY_SIZE,
                    speed: 1.5 + gameState.level * 0.3,
                    direction: Math.floor(Math.random() * 4),
                    color: '#ff4757',
                    isAlive: true,
                    changeDirectionTimer: 0,
                    shootTimer: Math.random() * 100
                });
            }
        }

        // 绘制坦克
        function drawTank(tank, isPlayer) {
            if (!tank.isAlive) return;

            ctx.save();
            ctx.translate(tank.x + tank.width / 2, tank.y + tank.height / 2);

            // 根据方向旋转
            ctx.rotate(tank.direction * Math.PI / 2);

            // 坦克主体
            ctx.fillStyle = tank.color;
            ctx.fillRect(-tank.width / 2 + 2, -tank.height / 2 + 2, tank.width - 4, tank.height - 4);

            // 炮塔
            ctx.fillStyle = isPlayer ? '#00cc6a' : '#cc3333';
            ctx.beginPath();
            ctx.arc(0, 0, tank.width / 4, 0, Math.PI * 2);
            ctx.fill();

            // 炮管
            ctx.fillStyle = isPlayer ? '#00ff88' : '#ff4757';
            ctx.fillRect(-3, -tank.height / 2 - 8, 6, tank.height / 2);

            // 履带效果
            ctx.fillStyle = isPlayer ? '#00aa55' : '#aa2222';
            ctx.fillRect(-tank.width / 2, -tank.height / 2, 5, tank.height);
            ctx.fillRect(tank.width / 2 - 5, -tank.height / 2, 5, tank.height);

            ctx.restore();
        }

        // 绘制子弹
        function drawBullet(bullet, isEnemy) {
            ctx.beginPath();
            ctx.arc(bullet.x, bullet.y, BULLET_SIZE, 0, Math.PI * 2);
            ctx.fillStyle = isEnemy ? '#ffcc00' : '#00ffff';
            ctx.fill();
            ctx.shadowColor = isEnemy ? '#ffcc00' : '#00ffff';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // 绘制墙壁
        function drawWalls() {
            walls.forEach(wall => {
                if (wall.type === 'border') {
                    ctx.fillStyle = '#4a4a6a';
                    ctx.fillRect(wall.x, wall.y, WALL_SIZE, WALL_SIZE);

                    // 边框效果
                    ctx.strokeStyle = '#6a6a8a';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(wall.x + 2, wall.y + 2, WALL_SIZE - 4, WALL_SIZE - 4);
                } else {
                    ctx.fillStyle = '#8b7355';
                    ctx.fillRect(wall.x, wall.y, WALL_SIZE, WALL_SIZE);

                    // 砖块效果
                    ctx.strokeStyle = '#a08060';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(wall.x, wall.y + WALL_SIZE / 2);
                    ctx.lineTo(wall.x + WALL_SIZE, wall.y + WALL_SIZE / 2);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(wall.x + WALL_SIZE / 2, wall.y);
                    ctx.lineTo(wall.x + WALL_SIZE / 2, wall.y + WALL_SIZE / 2);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(wall.x, wall.y + WALL_SIZE / 2);
                    ctx.lineTo(wall.x, wall.y + WALL_SIZE);
                    ctx.stroke();
                }
            });
        }

        // 碰撞检测
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 移动坦克
        function moveTank(tank, direction, isPlayer) {
            const oldX = tank.x;
            const oldY = tank.y;
            const oldDirection = tank.direction;

            tank.direction = direction;

            switch (direction) {
                case 0: tank.y -= tank.speed; break; // 上
                case 1: tank.x += tank.speed; break; // 右
                case 2: tank.y += tank.speed; break; // 下
                case 3: tank.x -= tank.speed; break; // 左
            }

            // 边界检测
            tank.x = Math.max(WALL_SIZE, Math.min(CANVAS_WIDTH - tank.width - WALL_SIZE, tank.x));
            tank.y = Math.max(WALL_SIZE, Math.min(CANVAS_HEIGHT - tank.height - WALL_SIZE, tank.y));

            // 墙壁碰撞检测
            for (let wall of walls) {
                if (wall.type === 'border' || wall.type === 'normal') {
                    if (checkCollision(tank, { x: wall.x, y: wall.y, width: WALL_SIZE, height: WALL_SIZE })) {
                        tank.x = oldX;
                        tank.y = oldY;
                        if (!isPlayer) {
                            tank.direction = Math.floor(Math.random() * 4);
                        }
                        return false;
                    }
                }
            }

            // 敌人之间的碰撞检测
            if (!isPlayer) {
                for (let other of enemies) {
                    if (other !== tank && other.isAlive && checkCollision(tank, other)) {
                        tank.x = oldX;
                        tank.y = oldY;
                        tank.direction = Math.floor(Math.random() * 4);
                        return false;
                    }
                }
            }

            return true;
        }

        // 发射子弹
        function shoot(tank, isPlayer) {
            if (tank.cooldown > 0) return;

            const bullet = {
                x: tank.x + tank.width / 2,
                y: tank.y + tank.height / 2,
                speed: 6
            };

            // 根据方向设置子弹起始位置和速度
            switch (tank.direction) {
                case 0: // 上
                    bullet.y = tank.y;
                    bullet.vy = -bullet.speed;
                    bullet.vx = 0;
                    break;
                case 1: // 右
                    bullet.x = tank.x + tank.width;
                    bullet.vx = bullet.speed;
                    bullet.vy = 0;
                    break;
                case 2: // 下
                    bullet.y = tank.y + tank.height;
                    bullet.vy = bullet.speed;
                    bullet.vx = 0;
                    break;
                case 3: // 左
                    bullet.x = tank.x;
                    bullet.vx = -bullet.speed;
                    bullet.vy = 0;
                    break;
            }

            if (isPlayer) {
                bullets.push(bullet);
                tank.cooldown = 15;
            } else {
                enemyBullets.push(bullet);
                tank.cooldown = 60;
            }
        }

        // 更新子弹
        function updateBullets(bulletArray, isEnemy) {
            for (let i = bulletArray.length - 1; i >= 0; i--) {
                let bullet = bulletArray[i];
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;

                // 移除出界的子弹
                if (bullet.x < 0 || bullet.x > CANVAS_WIDTH ||
                    bullet.y < 0 || bullet.y > CANVAS_HEIGHT) {
                    bulletArray.splice(i, 1);
                    continue;
                }

                // 墙壁碰撞
                let hitWall = false;
                for (let j = walls.length - 1; j >= 0; j--) {
                    let wall = walls[j];
                    if (bullet.x > wall.x && bullet.x < wall.x + WALL_SIZE &&
                        bullet.y > wall.y && bullet.y < wall.y + WALL_SIZE) {
                        hitWall = true;
                        if (wall.type === 'normal') {
                            walls.splice(j, 1); // 破坏普通墙壁
                        }
                        break;
                    }
                }

                if (hitWall) {
                    bulletArray.splice(i, 1);
                    continue;
                }

                // 玩家子弹击中敌人
                if (!isEnemy) {
                    for (let enemy of enemies) {
                        if (enemy.isAlive &&
                            bullet.x > enemy.x && bullet.x < enemy.x + enemy.width &&
                            bullet.y > enemy.y && bullet.y < enemy.y + enemy.height) {
                            enemy.isAlive = false;
                            bulletArray.splice(i, 1);
                            gameState.score += 100;
                            updateUI();
                            break;
                        }
                    }
                }
                // 敌人子弹击中玩家
                else {
                    if (player.isAlive &&
                        bullet.x > player.x && bullet.x < player.x + player.width &&
                        bullet.y > player.y && bullet.y < player.y + player.height) {
                        player.isAlive = false;
                        bulletArray.splice(i, 1);
                        gameState.lives--;
                        updateUI();
                        if (gameState.lives <= 0) {
                            endGame();
                        } else {
                            respawnPlayer();
                        }
                    }
                }
            }
        }

        // 更新敌人
        function updateEnemies() {
            enemies.forEach(enemy => {
                if (!enemy.isAlive) return;

                // 移动
                moveTank(enemy, enemy.direction, false);

                // 随机改变方向
                enemy.changeDirectionTimer++;
                if (enemy.changeDirectionTimer > 60) {
                    enemy.changeDirectionTimer = 0;
                    enemy.direction = Math.floor(Math.random() * 4);
                }

                // 射击
                enemy.shootTimer++;
                if (enemy.shootTimer > 80 + Math.random() * 60) {
                    enemy.shootTimer = 0;
                    // 有一定概率射击
                    if (Math.random() > 0.5) {
                        shoot(enemy, false);
                    }
                }

                // 减少冷却
                if (enemy.cooldown > 0) enemy.cooldown--;
            });
        }

        // 玩家重生
        function respawnPlayer() {
            setTimeout(() => {
                player.x = CANVAS_WIDTH / 2 - TANK_SIZE / 2;
                player.y = CANVAS_HEIGHT - TANK_SIZE - 10;
                player.isAlive = true;
            }, 1500);
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('lives').textContent = gameState.lives;
            document.getElementById('level').textContent = gameState.level;
        }

        // 检查关卡完成
        function checkLevelComplete() {
            const aliveEnemies = enemies.filter(e => e.isAlive).length;
            if (aliveEnemies === 0) {
                gameState.level++;
                gameState.score += 500; // 关卡奖励
                initWalls();
                initEnemies();
                updateUI();
            }
        }

        // 结束游戏
        function endGame() {
            gameState.isGameOver = true;
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('gameOver').style.display = 'block';
        }

        // 重新开始游戏
        function restartGame() {
            gameState = {
                score: 0,
                lives: 3,
                level: 1,
                isGameOver: false,
                isPaused: false
            };

            player = {
                x: CANVAS_WIDTH / 2 - TANK_SIZE / 2,
                y: CANVAS_HEIGHT - TANK_SIZE - 10,
                width: TANK_SIZE,
                height: TANK_SIZE,
                speed: 4,
                direction: 0,
                color: '#00ff88',
                isAlive: true,
                cooldown: 0
            };

            bullets = [];
            enemyBullets = [];

            initWalls();
            initEnemies();
            updateUI();

            document.getElementById('gameOver').style.display = 'none';
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameState.isGameOver) {
                // 清空画布
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                // 绘制背景网格
                ctx.strokeStyle = '#1a1a3a';
                ctx.lineWidth = 0.5;
                for (let i = 0; i < CANVAS_WIDTH; i += 30) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, CANVAS_HEIGHT);
                    ctx.stroke();
                }
                for (let i = 0; i < CANVAS_HEIGHT; i += 30) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(CANVAS_WIDTH, i);
                    ctx.stroke();
                }

                // 处理玩家输入
                if (player.isAlive) {
                    if (keys['KeyW'] || keys['ArrowUp']) moveTank(player, 0, true);
                    else if (keys['KeyD'] || keys['ArrowRight']) moveTank(player, 1, true);
                    else if (keys['KeyS'] || keys['ArrowDown']) moveTank(player, 2, true);
                    else if (keys['KeyA'] || keys['ArrowLeft']) moveTank(player, 3, true);

                    if (keys['Space']) shoot(player, true);

                    if (player.cooldown > 0) player.cooldown--;
                }

                // 更新游戏元素
                updateEnemies();
                updateBullets(bullets, false);
                updateBullets(enemyBullets, true);
                checkLevelComplete();

                // 绘制游戏元素
                drawWalls();

                // 绘制敌人
                enemies.forEach(enemy => drawTank(enemy, false));

                // 绘制玩家
                if (player.isAlive) {
                    drawTank(player, true);
                }

                // 绘制子弹
                bullets.forEach(bullet => drawBullet(bullet, false));
                enemyBullets.forEach(bullet => drawBullet(bullet, true));
            }

            requestAnimationFrame(gameLoop);
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'KeyR') {
                restartGame();
            }

            // 阻止方向键滚动页面
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // 初始化游戏
        initWalls();
        initEnemies();
        updateUI();
        gameLoop();
    </script>
</body>
</html>
